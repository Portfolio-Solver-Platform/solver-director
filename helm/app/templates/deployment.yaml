apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "service.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "service.name" . }}
    app: {{ include "service.name" . }}

spec:
  revisionHistoryLimit: {{ .Values.revisionHistoryLimit }}
  strategy:
    type: {{ .Values.updateStrategy.type }}
    rollingUpdate:
      maxUnavailable: {{ .Values.updateStrategy.maxUnavailable }}
      maxSurge: {{ .Values.updateStrategy.maxSurge }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "service.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "service.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      serviceAccountName: solver-director
      securityContext:
        runAsNonRoot: {{ .Values.podSecurityContext.runAsNonRoot }}
        seccompProfile:
          type: {{ .Values.podSecurityContext.seccompProfile.type }}
      containers:
        - name: solver-director-server
          image: {{ required "image should be set by skaffold which it is not" .Values.image }}
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          securityContext:
            allowPrivilegeEscalation: {{ .Values.containerSecurityContext.allowPrivilegeEscalation }}
            readOnlyRootFilesystem: {{ .Values.containerSecurityContext.readOnlyRootFilesystem }}
            capabilities:
              drop: {{ .Values.containerSecurityContext.capabilities.drop }}
          ports:
            - containerPort: {{ .Values.service.targetPort }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.path }}
              port: {{ .Values.probes.readiness.port }}
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path }}
              port: {{ .Values.probes.liveness.port }}
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
          resources:
            requests:
              cpu: {{ .Values.resources.requests.cpu }}
              memory: {{ .Values.resources.requests.memory }}
            limits:
              cpu: {{ .Values.resources.limits.cpu }}
              memory: {{ .Values.resources.limits.memory }}  
          env:
            - name: DEBUG
              value: {{ .Values.app.debug | default "false" | quote }}
            - name: DB_HOST
              value: {{ .Values.postgres.service.name | quote }}
            - name: DB_PORT
              value: {{ .Values.postgres.service.port | quote }}
            - name: DB_NAME
              value: {{ .Values.postgres.database.name | quote }}
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: solver-director-database-credentials
                  key: user
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: solver-director-database-credentials
                  key: password
            - name: DEFAULT_PER_USER_CPU_CORES
              value: {{ .Values.resourceLimitDefaults.perUserCpuCores | quote }}
            - name: DEFAULT_PER_USER_MEMORY_GIB
              value: {{ .Values.resourceLimitDefaults.perUserMemoryGib | quote }}
            - name: DEFAULT_GLOBAL_MAX_CPU_CORES
              value: {{ .Values.resourceLimitDefaults.globalMaxCpuCores | quote }}
            - name: DEFAULT_GLOBAL_MAX_MEMORY_GIB
              value: {{ .Values.resourceLimitDefaults.globalMaxMemoryGib | quote }}
            - name: SOLVER_CONTROLLER_IMAGE
              value: {{ .Values.solverController.image | quote }}
            - name: DATA_GATHERER_IMAGE
              value: {{ .Values.dataGatherer.image | quote }}
            - name: KEYCLOAK_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: solver-director-auth-client
                  key: id
            - name: KEYCLOAK_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: solver-director-auth-client
                  key: secret

      volumes:
        - name: tmp
          emptyDir: {}
