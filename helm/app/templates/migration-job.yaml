apiVersion: v1
kind: ServiceAccount
metadata:
  name: solver-director-migration
  annotations:
    "helm.sh/hook": pre-upgrade,pre-install
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "service.fullname" . }}-migration-{{ .Release.Revision }}
  labels:
    app.kubernetes.io/name: {{ include "service.name" . }}
    app.kubernetes.io/component: migration
  annotations:
    "helm.sh/hook": pre-upgrade,pre-install
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: {{ .Values.migration.backoffLimit }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "service.name" . }}
        app.kubernetes.io/component: migration
    spec:
      restartPolicy: Never
      serviceAccountName: solver-director-migration
      securityContext:
        runAsNonRoot: {{ .Values.podSecurityContext.runAsNonRoot }}
        seccompProfile:
          type: {{ .Values.podSecurityContext.seccompProfile.type }}
      containers:
        - name: alembic-migration
          image: {{ required "image should be set by skaffold which it is not" .Values.image }}
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          command: ["alembic", "upgrade", "head"]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false  # Alembic needs to write temp files
            capabilities:
              drop:
                - ALL
          env:
            - name: DB_HOST
              value: {{ .Values.postgres.service.name | quote }}
            - name: DB_PORT
              value: {{ .Values.postgres.service.port | quote }}
            - name: DB_NAME
              value: {{ .Values.postgres.database.name | quote }}
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: solver-director-database-credentials
                  key: user
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: solver-director-database-credentials
                  key: password
            - name: DATABASE_URL
              value: "postgresql://$(DB_USER):$(DB_PASSWORD)@$(DB_HOST):$(DB_PORT)/$(DB_NAME)"
          resources:
            requests:
              cpu: {{ .Values.migration.resources.requests.cpu }}
              memory: {{ .Values.migration.resources.requests.memory }}
            limits:
              cpu: {{ .Values.migration.resources.limits.cpu }}
              memory: {{ .Values.migration.resources.limits.memory }}
