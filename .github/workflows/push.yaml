name: Publish Docker image

on:
  push:
    branches: [ main ]

jobs:
  ci:
    uses: ./.github/workflows/ci.yaml

  push:
    needs: ci

    permissions:
      contents: read
      packages: write

    uses: Portfolio-Solver-Platform/infrastructure/.github/workflows/push.yaml@3a4bbe38dcc6e2a787b3808752575d56449bc362 # main
    with:
      image_name: solver-director
    secrets:
      repo_bot_private_key: ${{ secrets.REPO_BOT_PRIVATE_KEY }}
