name: Publish Docker image

on:
  push:
    branches: [ main ]

jobs:
  ci:
    uses: ./.github/workflows/ci.yaml

  push:
    needs: ci

    permissions:
      contents: read
      packages: write

    uses: Portfolio-Solver-Platform/infrastructure/.github/workflows/push.yaml@d42d631d88213f69978016b0414f7583e0314c9a # main
    with:
      image_name: solver-director
    secrets:
      repo_bot_private_key: ${{ secrets.REPO_BOT_PRIVATE_KEY }}
